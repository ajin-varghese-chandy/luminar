name: Convert PPTX to Markdown

on:
  push:
    paths:
      - '**/*.pptx'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Convert PPTX to Markdown
        run: python scripts/pptx_to_md.py

      - name: Verify conversion completeness
        run: python scripts/test_conversion.py

      - name: Swap original PPTX files
        run: |
          find . -name "*.pptx" -type f | while IFS= read -r f; do
            echo "Removing $f"
            git rm -f "$f" 2>/dev/null || rm -f "$f"
          done

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "Auto-convert PPTX to Markdown [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
