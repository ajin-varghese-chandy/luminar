<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORM</title>
</head>

<body>
    <h1>Form</h1>
    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" placeholder="enter your username">
        <br><br>
        <label for="em">Email:</label>
        <input type="email" id="em" placeholder="example@gmail.com">
        <br> <br>
        <label for="pswd">Password:</label>
        <input type="password" id="pswd" placeholder="enter password here">
        <br> <br>
        <label for="ph">Phone:</label>
        <input type="text" id="ph" placeholder="enter your phone number">
        <br> <br>
        <label for="age">Age:</label>
        <input type="number" id="age" placeholder="enter your age">
        <br> <br>
        <label for="dob">DOB </label>
        <input type="date" id="dob">
        <br><br>
        <label for="addr">Address: </label>
        <textarea name="addr" id="addr" cols="40" rows="10"></textarea>
        <br><br>
        <label for="gender">Gender:</label>
        <input type="radio" id="ml" name="gender">
        <label for="ml">Male</label>
        <input type="radio" id="fe" name="gender">
        <label for="ml">Female</label>
        <input type="radio" id="oth" name="gender">
        <label for="oth ">Others</label>
        <br><br>
        <label>skills : </label>
        <input type="checkbox" id="re">
        <label for="re">React</label>
        <input type="checkbox" id="an">
        <label for="an">Angular</label>
        <input type="checkbox" id="no">
        <label for="no">Node</label>
        <input type="checkbox" id="nxt">
        <label for="nxt">Nextjs</label>
        <br><br>
        <label for="">Location :</label>
        <select name="" id="">
            <option value="">Tvm</option>
            <option value="">Ern</option>
            <option value="">Ktm</option>
            <option value="">Kollam</option>
            <option selected hidden value="">choose your Location</option>

        </select>
        <br><br>
        <label for="">Upload your resume</label>
        <input type="file">
        <br><br>
        <input type="button" value="submit">
        <button type="reset">reset</button>
    </form>
</body>

</html>
