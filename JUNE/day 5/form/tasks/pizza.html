<!DOCTYPE html>
<html>
<head>
    <title>Pizza Shop 2.0</title>
</head>
<body>

<form>
    <table border="1">
        <tr>
            <th colspan="2">Pizza Shop 2.0</th>
        </tr>

        <tr>
            <td>Name</td>
            <td>
                <input type="text" size="40">
            </td>
        </tr>

        <tr>
            <td>Pizza Topping</td>
            <td>
                <input type="radio" name="topping"> Supreme <br>
                <input type="radio" name="topping"> Vegetarian <br>
                <input type="radio" name="topping"> Hawaiian
            </td>
        </tr>

        <tr>
            <td>Pizza Sauce</td>
            <td>
                <select>
                    <option>Tomato</option>
                    <option>Barbecue</option>
                    <option>White Sauce</option>
                </select>
            </td>
        </tr>

        <tr>
            <td>Optional Extras</td>
            <td>
                <input type="checkbox"> Extra Cheese
                <input type="checkbox"> Gluten Free Base
            </td>
        </tr>

        <tr>
            <td colspan="2">
                Delivery Instructions:
                <br><br>
                <textarea rows="6" cols="80"></textarea>
            </td>
        </tr>

        <tr>
            <td colspan="2">
                <input type="submit" value="Send my Order">
            </td>
        </tr>
    </table>
</form>

</body>
</html>
