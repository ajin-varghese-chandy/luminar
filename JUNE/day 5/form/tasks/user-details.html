<!DOCTYPE html>
<html>
<head>
    <title>Payment Form</title>
</head>
<body>

<form>


    <b>Address Information</b>

    <table cellpadding="5">
        <tr>
            <td align="right">CardHolder Name:</td>
            <td><input type="text" size="35"></td>
        </tr>

        <tr>
            <td align="right">Date of Birth:</td>
            <td>
                <input type="text" size="2" maxlength="2">
                <input type="text" size="2" maxlength="2">
                <input type="text" size="4" maxlength="4">
                (dd/mm/yyyy)
            </td>
        </tr>

        <tr>
            <td align="right">Mother Maiden Name:</td>
            <td><input type="text" size="35"></td>
        </tr>

        <tr>
            <td align="right">Address:</td>
            <td><input type="text" size="35"></td>
        </tr>

        <tr>
            <td align="right">Town/City:</td>
            <td><input type="text" size="35"></td>
        </tr>

        <tr>
            <td align="right">Province/Region:</td>
            <td><input type="text" size="35"></td>
        </tr>

        <tr>
            <td align="right">Postal Code:</td>
            <td><input type="text" size="12"></td>
        </tr>

        <tr>
            <td align="right">Phone Number:</td>
            <td><input type="text" size="35"></td>
        </tr>
    </table>


<br>

<b>Credit Card Information</b>

    <table cellpadding="5">
        <tr>
            <td align="right">Bank Name:</td>
            <td><input type="text" size="35"></td>
        </tr>

        <tr>
            <td align="right">Debit / Credit Card Number:</td>
            <td>
                <input type="text" size="35">
                <img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Visa_Inc._logo_%282005%E2%80%932014%29.png" width="50">
                <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" width="50">
                <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Maestro_Logo.svg" width="50">
            </td>
        </tr>

        <tr>
            <td align="right">Expiration Date:</td>
            <td>
                <select>
                    <option>01</option>
                    <option>02</option>
                    <option>03</option>
                    <option>04</option>
                    <option>05</option>
                    <option>06</option>
                    <option>07</option>
                    <option>08</option>
                    <option>09</option>
                    <option>10</option>
                    <option>11</option>
                    <option>12</option>
                </select>

                <select>
                    <option>2026</option>
                    <option>2027</option>
                    <option>2028</option>
                    <option>2029</option>
                    <option>2030</option>
                </select>
            </td>
        </tr>

        <tr>
            <td align="right">Card Verification Number:</td>
            <td>
                <input type="text" size="6">
                <a href="#">view sample</a>
            </td>
        </tr>

        <tr>
            <td align="right">Password:</td>
            <td><input type="password" size="35"></td>
        </tr>

        <tr>
            <td></td>
            <td>
                <b>We Participate In:</b><br><br>
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRHl2imE7emfBp7Bgt2HcBoLIBVo2kcsOpjPA&s" width="80">
                <img src="https://www.mastercard.com/brandcenter/us/en/download-artwork/_jcr_content/root/container/container_1578756628/container_copy/container/tabs/item_1740215907781/container/container_1866038453_72716970/image.coreimg.png/1751029719182/ma-bc-dxp-other-marks-securecode-x.png" width="80">
            </td>
        </tr>
    </table>

<br>

<input type="submit" value="Submit Information">

</form>

</body>
</html>
